- id: q16
  goal: "Find the exact number of jobs Microsoft cut in its July 2025 layoff round (the second major round of 2025, after the ~6,000 cut in May 2025), and the approximate percentage of its global workforce it represented."
  kind: market
  expected: "About 9,000 jobs cut, representing roughly 4% of Microsoft's ~228,000-person workforce, announced July 2, 2025. (Microsoft did not publish an exact figure; the separate '9,100' figure refers specifically to gaming-division cuts, not the company-wide round.) As of 2026-06-18."
  keywords: ["9,000", "4%"]
  why_hard: "The event post-dates many training cutoffs, Microsoft never published an exact count, and 2025's multiple rounds (6,000 / 9,000 / gaming 9,100) make a falsely-precise figure easy to hallucinate."
  sources: ["https://www.cnbc.com/2025/07/02/microsoft-laying-off-about-9000-employees-in-latest-round-of-cuts.html", "https://www.bloomberg.com/news/articles/2025-07-02/microsoft-to-cut-9-000-workers-in-second-wave-of-major-layoffs"]

- id: q17
  goal: "Find Nvidia's Data Center segment revenue and total revenue for its fiscal Q1 2027 (the quarter ended April 26, 2026, reported May 20, 2026)."
  kind: market
  expected: "Record total revenue of $81.6 billion (up 85% YoY) with record Data Center revenue of $75.2 billion (up 92% YoY) for Q1 fiscal 2027 (quarter ended April 26, 2026), reported May 20, 2026. Within Data Center: compute $60.4B, networking $14.8B. As of 2026-06-18."
  keywords: ["$75.2 billion", "$81.6 billion"]
  why_hard: "Reported May 20, 2026 — after typical training cutoffs — so a model falls back to an older quarter (e.g. Q4 FY2026's $62.3B Data Center), and must not conflate the $75.2B full segment with the $60.4B compute sub-line. (NOTE: ground-truth corrected from a stale Q4 FY2026 version after the agent itself surfaced the more-recent quarter — see EVAL findings.)"
  sources: ["https://www.sec.gov/Archives/edgar/data/0001045810/000104581026000051/q1fy27pr.htm", "https://www.stocktitan.net/sec-filings/NVDA/8-k-nvidia-corp-reports-material-event-56086a88bbb4.html"]

