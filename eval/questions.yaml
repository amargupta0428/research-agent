  kind: fact
  expected: "Intel appointed Lip-Bu Tan (former Cadence Design Systems CEO) as CEO, announced March 12, 2025, effective March 18, 2025. He succeeded Interim Co-CEOs David Zinsner and Michelle (MJ) Johnston Holthaus."
  keywords: ["Lip-Bu Tan", "March 18, 2025"]
