# Eval set v2 — 20 HARD, un-memorizable company/market research questions.
# Every question targets facts a frontier LLM CANNOT answer from parametric memory:
# recent (2025-2026) funding/M&A/exec/earnings events, niche disclosed figures, or
# multi-source comparisons. Each answer was web-verified against the listed sources.
#
# Fields: id, goal, kind (fact|synthesis|market), expected (ground truth, "as of" dated
# where time-sensitive), keywords (high-precision substrings for the programmatic check),
# why_hard (why memory can't answer it), sources (URLs used to verify the ground truth).
# The agent is scored against `expected`/`keywords`; `sources`/`why_hard` document the set.

- id: q01
  goal: "Identify the lead investor and the exact post-money valuation of Anthropic's Series F funding round announced in September 2025, and the total amount raised."
  kind: fact
  expected: "Anthropic raised $13 billion in its Series F, announced September 2, 2025, at a $183 billion post-money valuation. The round was led by ICONIQ, co-led by Fidelity Management & Research Company and Lightspeed Venture Partners."
  keywords: ["$183 billion", "ICONIQ", "$13 billion"]
  why_hard: "Requires the exact post-money figure and the specific lead investor (ICONIQ), a precise fact disclosed in September 2025 and easily confused with prior or later Anthropic rounds."
  sources: ["https://www.anthropic.com/news/anthropic-raises-series-f-at-usd183b-post-money-valuation", "https://techcrunch.com/2025/09/02/anthropic-raises-13b-series-f-at-183b-valuation/"]

- id: q02
  goal: "Determine the size, valuation, and lead investor of Mistral AI's Series C funding round announced in September 2025, including the lead investor's contribution."
  kind: fact
  expected: "Mistral AI raised a EUR 1.7 billion Series C announced September 9, 2025, at a EUR 11.7 billion (about $14 billion) post-money valuation. It was led by Dutch chip-equipment maker ASML, which invested EUR 1.3 billion for roughly an 11% stake."
  keywords: ["ASML", "1.7 billion", "11.7 billion"]
  why_hard: "ASML (a chip-equipment maker, not a VC) as lead investor is counterintuitive, and the euro-denominated figures plus the EUR 1.3B sub-amount are specific and post-cutoff."
  sources: ["https://mistral.ai/news/mistral-ai-raises-1-7-b-to-accelerate-technological-progress-with-ai/", "https://sifted.eu/articles/mistral-confirms-series-c-asml"]

- id: q03
  goal: "Find the seed round size, valuation, and lead investor of Mira Murati's Thinking Machines Lab, as confirmed when the round officially closed in July 2025."
  kind: fact
  expected: "Thinking Machines Lab closed a $2 billion seed round (officially July 14, announced July 15, 2025) at a $12 billion valuation, led by Andreessen Horowitz, with participation from Nvidia, Accel, ServiceNow, Cisco, AMD, and Jane Street."
  keywords: ["$12 billion", "$2 billion", "Andreessen Horowitz"]
  why_hard: "The final valuation ($12B) differs from earlier widely-reported June figures ($10B), so a model must distinguish the closed-round number from preliminary reports."
  sources: ["https://techcrunch.com/2025/07/15/mira-muratis-thinking-machines-lab-is-worth-12b-in-seed-round/", "https://en.wikipedia.org/wiki/Thinking_Machines_Lab"]

- id: q04
  goal: "Identify the IPO offer price per share, gross proceeds, and exchange/ticker for CoreWeave's March 2025 initial public offering."
  kind: fact
  expected: "CoreWeave priced its IPO at $40.00 per share on March 27, 2025, selling 37.5 million Class A shares to raise about $1.5 billion (gross), listing on the Nasdaq Global Select Market under ticker CRWV; shares began trading March 28, 2025. The $40 price was below the expected $47-$55 range."
  keywords: ["$40", "CRWV", "$1.5 billion"]
  why_hard: "The $40 price came in below the marketed $47-$55 range and the deal was downsized, so the exact priced figure and proceeds require the final pricing release, not the preliminary range."
  sources: ["https://www.coreweave.com/news/coreweave-announces-pricing-of-initial-public-offering", "https://www.cnbc.com/2025/03/28/coreweave-starts-trading-on-nasdaq-at-per-share.html"]

- id: q05
  goal: "Determine the amount raised, valuation, and lead investor of Safe Superintelligence (SSI)'s funding round reported in April 2025."
  kind: fact
  expected: "Safe Superintelligence (Ilya Sutskever's startup) raised an additional $2 billion at a $32 billion valuation, reported April 2025, in a round led by Greenoaks (reported ~$500 million), with backers including Andreessen Horowitz, Lightspeed, DST Global, Alphabet, and Nvidia."
  keywords: ["$32 billion", "Greenoaks", "$2 billion"]
  why_hard: "SSI is pre-product and secretive; the lead investor Greenoaks and the jump to a $32B valuation are specific facts not derivable from general knowledge and post-cutoff."
  sources: ["https://techcrunch.com/2025/04/12/openai-co-founder-ilya-sutskevers-safe-superintelligence-reportedly-valued-at-32b/", "https://news.crunchbase.com/business/biggest-rounds-april-2025-safe-superintelligence-plaid/"]

- id: q06
  goal: "On what exact date did Google complete (close) its acquisition of cloud security company Wiz, and what was the all-cash purchase price?"
  kind: fact
  expected: "Google completed its acquisition of Wiz on March 11, 2026, for $32 billion in an all-cash deal (announced March 18, 2025; closed roughly a year later after US and EU regulatory clearance)."
  keywords: ["$32 billion", "March 11, 2026"]
  why_hard: "The deal CLOSED on March 11, 2026 — after an early-2026 training cutoff — so the close date and completion cannot be memorized, only the original announcement."
  sources: ["https://techcrunch.com/2026/03/11/google-completes-32b-acquisition-of-wiz/", "https://www.cybersecuritydive.com/news/google-32-billion-acquisition-wiz/814437/"]

- id: q07
