- id: q08
  goal: "How much did OpenAI pay to acquire Jony Ive's AI hardware startup 'io', what was the deal structure, and on what date did the acquisition close?"
  kind: fact
  expected: "OpenAI acquired io (Jony Ive's AI device startup) in an all-stock deal valued at about $6.5 billion (announced May 21, 2025); the merger completion was announced July 9, 2025. Ive took on creative/design responsibilities across OpenAI and io while LoveFrom remained independent."
  keywords: ["$6.5 billion", "July 9, 2025"]
  why_hard: "The deal value is often misreported as $6.4B vs $6.5B, and the all-stock close date (July 9, 2025) is separate from the May 21 announcement."
  sources: ["https://www.bloomberg.com/news/articles/2025-07-09/openai-closes-6-5-billion-deal-to-buy-jony-ive-s-device-startup", "https://techcrunch.com/2025/05/21/jony-ive-to-lead-openais-design-work-following-6-5b-acquisition-of-his-company/"]

- id: q09
  goal: "Identify the size of Nvidia's announced investment in OpenAI, the gigawatts of systems to be deployed, the announcement date, and the platform used for the first gigawatt."
  kind: fact
  expected: "On September 22, 2025, Nvidia and OpenAI announced a strategic partnership: Nvidia intends to invest up to $100 billion in OpenAI to deploy at least 10 gigawatts of Nvidia systems; the first gigawatt comes online in H2 2026 on the Nvidia Vera Rubin platform."
  keywords: ["$100 billion", "10 gigawatts", "September 22, 2025"]
