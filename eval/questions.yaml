  kind: synthesis
  expected: "GitHub Copilot Pro is the cheapest at $10/month, half the price of both Cursor Pro ($20/month) and Windsurf Pro ($20/month, which are tied), as of 2026-06-18."
  keywords: ["GitHub Copilot Pro", "$10"]
  why_hard: "Requires pulling and comparing the current monthly-billed price from three separate official vendor pricing pages and excluding annual-discount figures."
  sources: ["https://github.com/features/copilot/plans", "https://docs.github.com/en/copilot/about-github-copilot/plans-for-github-copilot", "https://cursor.com/pricing"]

- id: q11
  goal: "Compare the standard API input price per 1 million tokens (base/standard tier) for three frontier LLMs — Google Gemini 2.5 Pro, Anthropic Claude Opus 4.x, and OpenAI's current GPT-5 flagship — and determine which has the cheapest input price and the figure."
  kind: synthesis
  expected: "Google Gemini 2.5 Pro has the cheapest input price at $1.25 per 1M tokens (prompts <=200k), roughly 4x cheaper than Claude Opus 4.8 ($5/1M) and OpenAI GPT-5.5 ($5/1M, tied), as of 2026-06-18."
  keywords: ["Gemini 2.5 Pro", "$1.25"]
  why_hard: "Requires reconciling three vendors' official API pricing pages, navigating context-length tiering (Gemini's <=200k tier), and identifying the current flagship model names."
  sources: ["https://ai.google.dev/gemini-api/docs/pricing", "https://platform.claude.com/docs/en/about-claude/pricing", "https://developers.openai.com/api/docs/pricing"]

